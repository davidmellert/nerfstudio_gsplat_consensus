# Run with: python scripts/version_gradient_analysis.py --config configs/experiments/version_analysis_tobi.yml

method: splatfacto-colmap
data: /mnt/hdd/data/bicycle
downscale_factor: 8
load_dir: outputs/bicycle/splatfacto-colmap/2026-06-02_180954/nerfstudio_models
load_step: 14999

dataparser:
  images_path: images_sunset_8
  skip_missing_images: true
  auto_downscale_missing_images: false
  eval_mode: all

